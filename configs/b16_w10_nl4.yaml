# !! PLEASE NOTE: `minimal.yaml` is meant as a _minimal_ example of a tiny, fast
#                 training that can be used to verify your nequip install,
#                 the syntax of your configuration edits, etc.
#                 These are NOT recommended hyperparameters for real applications!
#                 Please see `example.yaml` for a reasonable starting point.

# general
root: eVperA_single_state_1to5
run_name: eV_b16_w10_nl4
seed: 123
dataset_seed: 456
append: true 

default_dtype: float64
model_dtype: float32
allow_tf32: true # false

model_builders:
 - SimpleIrrepsConfig         # update the config with all the irreps for the network if using the simplified `l_max` / `num_features` / `parity` syntax
 - nequip_nac.model.EnergyNACModel      # build a NequIP model that also predicts NACs
 - PerSpeciesRescale          # add per-atom / per-species scaling and shifting to the NequIP model before the total energy sum
 - ForceOutput                # wrap the energy model in a module that uses autodifferention to compute the forces
 - RescaleEnergyEtc

 ## two_energy_prediction
 # - ForceOutputState1
 # - ForceOutputState2

# network
num_basis: 8
num_layers: 4
r_max: 4.0
l_max: 2
parity: true
num_features: 16
# chemical_embedding_irreps_out: 16x0e  
# feature_irreps_hidden: 16x0e + 16x0o + 16x1e + 16x1o + 16x2e + 16x2o
# irreps_edge_sh: 0e + 1o + 2e # for l_max: 2, o/e alternate
# conv_to_output_hidden_irreps_out: 2x0e + 1x1o
nonlinearity_type: gate   

nonlinearity_scalars:
  e: silu
  o: tanh

nonlinearity_gates:
  e: silu
  o: tanh

invariant_layers: 2                                                               # number of radial layers, usually 1-3 works best, smaller is faster
invariant_neurons: 64                                                             # number of hidden neurons in radial function, smaller is faster
avg_num_neighbors: auto                                                           # number of neighbors to divide by, null => no normalization, auto computes it based on dataset 
use_sc: true    


# data set
# the keys used need to be stated at least once in key_mapping, npz_fixed_field_keys or npz_keys
# key_mapping is used to map the key in the npz file to the NequIP default values (see data/_key.py)
# all arrays are expected to have the shape of (nframe, natom, ?) except the fixed fields
# note that if your data set uses pbc, you need to also pass an array that maps to the nequip "pbc" key
dataset: ase
dataset_file_name: /n/holyscratch01/kozinsky_lab/mhwang/NAC_predict/single_state/eVperA_single_state_1to5.xyz
ase_args:
  format: extxyz
include_keys:
  - state
  - nac
  - total_energy
key_mapping:
  state: state
  nac: nac
  total_energy: total_energy

chemical_symbol_to_type:
  C: 0
  O: 1
  H: 2

# logging
wandb: true
wandb_project: NequIP-NAC
verbose: info
log_batch_freq: 10

# training
n_train: 18000
n_val: 2000
batch_size: 16
validation_batch_size: 16
learning_rate: 0.002  
max_epochs: 1000000
train_val_split: random
shuffle: true

# loss function
loss_coeffs:
  forces:
    - 1.0
    - MSELoss
  total_energy:
    - 1.0
    - PerAtomMSELoss
  nac:
    - 10.0
    - MSELoss

# optimizer
optimizer_name: Adam
optimizer_amsgrad: true

# lr scheduler
lr_scheduler_name: ReduceLROnPlateau
lr_scheduler_patience: 100
lr_scheduler_factor: 0.8

# output metrics
metrics_components:
  - - forces                               # key 
    - mae                                  # "rmse" or "mae"
  - - forces
    - rmse
  - - forces
    - mae
    - PerSpecies: True                     # if true, per species contribution is counted separately
      report_per_component: False          # if true, statistics on each component (i.e. fx, fy, fz) will be counted separately
  - - forces                                
    - rmse                                  
    - PerSpecies: True                     
      report_per_component: False    
  - - total_energy
    - mae    
  - - total_energy
    - mae
    - PerAtom: True
  - - nac
    - mae
  - - nac
    - rmse 
  - - nac
    - mae
    - PerSpecies: True                    
      report_per_component: False

per_species_rescale_scales: null